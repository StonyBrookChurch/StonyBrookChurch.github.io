name: Check for Livestream

on:
  schedule:
    # 8:50 AM Central - before first service (9:00 AM)
    # Two crons to handle DST: one for CDT (summer), one for CST (winter)
    - cron: '50 13 * * SUN'  # 8:50 AM CDT (UTC-5)
    - cron: '50 14 * * SUN'  # 8:50 AM CST (UTC-6)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Set timezone to America/Chicago
        run: |
          sudo timedatectl set-timezone America/Chicago

      - name: Check if correct season for this cron
        id: season
        run: |
          CURRENT_TZ=$(date +%Z)
          CURRENT_UTC_HOUR=$(date -u +%H)

          echo "Current timezone: $CURRENT_TZ, UTC hour: $CURRENT_UTC_HOUR"

          # Skip if wrong season triggered this cron
          # CDT (summer) cron fires at UTC 13, CST (winter) cron fires at UTC 14
          if [[ "$CURRENT_TZ" == "CST" && "$CURRENT_UTC_HOUR" == "13" ]]; then
            echo "⏭️  CST season but CDT cron fired - skipping"
            echo "should_run=false" >> $GITHUB_OUTPUT
          elif [[ "$CURRENT_TZ" == "CDT" && "$CURRENT_UTC_HOUR" == "14" ]]; then
            echo "⏭️  CDT season but CST cron fired - skipping"
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Correct season for this cron"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Poll for livestream
        if: steps.season.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMEOUT=1200     # 20 minutes max
          INTERVAL=30      # Check every 30 seconds
          START_EPOCH=$(date +%s)

          echo "🔍 Starting livestream detection (polling every ${INTERVAL}s for up to ${TIMEOUT}s)"

          while true; do
            CURRENT_EPOCH=$(date +%s)
            ELAPSED=$((CURRENT_EPOCH - START_EPOCH))

            if [[ $ELAPSED -ge $TIMEOUT ]]; then
              echo "❌ Timeout reached after ${ELAPSED}s - no livestream detected"
              exit 1
            fi

            CURRENT_TIME=$(date +%H:%M:%S)

            RESPONSE=$(curl -s "https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${{ secrets.YOUTUBE_CHANNEL_ID }}&eventType=live&type=video&key=${{ secrets.YOUTUBE_API_KEY }}")
            LIVE_COUNT=$(echo $RESPONSE | jq '.pageInfo.totalResults')

            if [[ "$LIVE_COUNT" -gt 0 ]]; then
              echo "🎥 Livestream detected at $CURRENT_TIME!"
              echo "🚀 Triggering deploy workflow..."
              gh workflow run deploy.yml --ref main
              echo "✅ Deploy triggered - exiting"
              exit 0
            fi

            echo "[$CURRENT_TIME] No livestream found (${ELAPSED}s elapsed)"
            sleep $INTERVAL
          done
